    "Stier": "Jupiter im Stier bringt Wachstum durch Beständigkeit und Qualität. Dein Wohlstand baut sich langsam und solide auf. Du wächst durch Geduld, durch das Vertrauen in natürliche Prozesse, durch das Investieren in Wert. Dein Schatten ist Übertreibung in Genuss. Deine Gabe ist das Aufbauen von nachhaltigem Wohlstand.",
    "Zwillinge": "Jupiter in den Zwillingen bringt Wachstum durch Lernen und Kommunikation. Dein Glück expandiert durch Bildung, durch Verbindungen, durch die Weitergabe von Wissen. Dein Schatten ist das Verzettle dich im Vielen. Deine Gabe ist die Begeisterung für das Lernen, die andere ansteckt.",
    "Krebs": "Jupiter im Krebs bringt Wachstum durch Fürsorge und emotionale Tiefe. Dein Glück kommt durch Verbindung, durch das Schaffen von Geborgenheit, durch das Investieren in Familie und Heimat. Dein Schatten ist das Klammern. Deine Gabe ist die grenzenlose Fähigkeit zu nähren.",
    "Löwe": "Jupiter im Löwen bringt Wachstum durch Kreativität und Sichtbarkeit. Dein Glück expandiert, wenn du dich zeigst, wenn du schöpfst, wenn du führst. Dein Schatten ist Übertreibung und Prahlerei. Deine Gabe ist die herzliche Großzügigkeit, die andere mit in dein Leuchten einlädt.",
    "Jungfrau": "Jupiter in der Jungfrau bringt Wachstum durch Präzision und Dienst. Dein Glück kommt durch das Feintunen, durch das Helfen, durch die Meisterschaft in deinem Handwerk. Dein Schatten ist der Perfektionismus, der Expansion verhindert. Deine Gabe ist die aussergewöhnliche Qualität deiner Arbeit.",
    "Waage": "Jupiter in der Waage bringt Wachstum durch Partnerschaften und Gerechtigkeit. Dein Glück expandiert durch kooperative Beziehungen, durch Fairness, durch das Schaffen von Harmonie. Dein Schatten ist die Unentschlossenheit. Deine Gabe ist die Fähigkeit, durch Partnerschaft mehr zu werden.",
    "Skorpion": "Jupiter im Skorpion bringt Wachstum durch Transformation. Dein Glück liegt in der Tiefe, in den großen Wandlungen, in dem, was nach der Krise kommt. Dein Schatten ist Obsession und Machthunger. Deine Gabe ist die außerordentliche Regenerationsfähigkeit, die Ressourcen aus dem Verborgenen hebt.",
    "Schütze": "Jupiter im Schützen ist in seinem Heimatzeichen und bringt natürliches Wachstum. Dein Glück liegt in Weite, Bildung, Reisen und Vision. Du wächst, wenn du groß denkst, wenn du glaubst, wenn du die Grenzen des Bekannten überschreitest. Dein Schatten ist Übertreibung. Deine Gabe ist der unerschütterliche Optimismus.",
    "Steinbock": "Jupiter im Steinbock bringt Wachstum durch Disziplin. Dein Glück ist verdient. Du baust es auf, Schritt für Schritt, mit Beharrlichkeit und Verantwortungsbewusstsein. Wenn du dein Wort hältst, öffnen sich Türen. Das ist das Prinzip Steinbock: Konsequenz wird belohnt. Dein Wachstum passiert, wenn du Fundamentales wählst. Wenn du Integrität über schnellen Erfolg stellst. Du bist der lebende Beweis: Disziplin schlägt Talent.",
    "Wassermann": "Jupiter im Wassermann bringt Wachstum durch Gemeinschaft und Innovation. Dein Glück expandiert, wenn du zur Gruppe beiträgst, wenn du Neues wagst, wenn du Systeme veränderst. Dein Schatten ist die Zerstreutheit in Kollektiven. Deine Gabe ist die visionäre Kraft im Dienst des Ganzen.",
    "Fische": "Jupiter in den Fischen bringt Wachstum durch das, was du nicht siehst, aber spürst. Dein Glück liegt nicht im Planen, sondern im Vertrauen. Im Öffnen für das Größere. Dein Kanal zu Fülle ist das Unsichtbare, das Intuitive, das, was zwischen den Zeilen liegt. Dein Schatten: du spürst so viel, dass du irgendwann nicht mehr weißt, was davon deins ist. Du fühlst den Schmerz anderer so, als wäre er deiner. Und manchmal vergisst du dabei, dass er es nicht ist. Dein Mitgefühl ist dein Geschenk. Solange du weißt, wo du aufhörst und die andere beginnt. Wer das lernt, trägt. Wer das nicht lernt, verliert sich."
  },

  saturn: {
    "Widder": "Saturn im Widder lehrt dich, Führung zu verdienen, nicht zu beanspruchen. Deine Lektionen liegen in Geduld und Konsequenz. Du wirst herausgefordert, deinen Mut mit Verantwortungsbewusstsein zu verbinden. Das Wachstum kommt durch das Vollenden, nicht nur durch das Beginnen. Wenn du gelernt hast, deine Energie zu fokussieren, wirst du eine Autorität in dem, was du anpackst.",
    "Stier": "Saturn im Stier lehrt dich, echten Wert aufzubauen und dir selbst zu vertrauen. Deine Lektionen kreisen um Selbstwert und materielle Sicherheit. Du wirst herausgefordert, das Fundament deines Lebens aus innerer Überzeugung zu bauen, nicht aus Angst. Wenn du gelernt hast, dir selbst genug zu sein, kommt der Wohlstand als Folge deiner Integrität.",
    "Zwillinge": "Saturn in den Zwillingen lehrt dich, Gedanken in Tiefe statt Breite zu entwickeln. Deine Lektionen liegen in fokussierter Kommunikation und diszipliniertem Denken. Du wirst herausgefordert, dein Wissen zu vertiefen und klar zu sprechen. Wenn du das beherrschst, wird deine Stimme eine Autorität.",
    "Krebs": "Saturn im Krebs lehrt dich emotionale Verantwortung. Deine Lektionen liegen in der Unterscheidung von Fürsorge und Kontrolle, von Schutz und Einengung. Du wirst herausgefordert, dir selbst ein sicheres inneres Zuhause zu bauen. Wenn du das kannst, bist du für andere eine unerschütterliche Stütze.",
    "Löwe": "Saturn im Löwen lehrt dich, aus innerer Autorität zu strahlen, nicht aus dem Bedürfnis nach Beifall. Deine Lektionen liegen in authentischer Führung und echter Kreativität. Du wirst herausgefordert, sichtbar zu sein, auch wenn niemand applaudiert. Wenn du das schaffst, ist dein Leuchten unabhängig und unaufhaltsam.",
    "Jungfrau": "Saturn in der Jungfrau lehrt dich, Perfektion in Weisheit zu wandeln. Deine Lektionen liegen im Unterschied zwischen sinnvollem Verbessern und erschöpfendem Perfektionismus. Du wirst herausgefordert, deine Arbeit anzubieten, auch wenn sie nicht fertig genug scheint. Die Meisterschaft liegt im Tun.",
    "Waage": "Saturn in der Waage lehrt dich, echte Gerechtigkeit zu verkörpern. Deine Lektionen liegen in Partnerschaften, in der Kunst, die eigene Position zu halten und gleichzeitig offen für den anderen zu sein. Du wirst herausgefordert, Entscheidungen zu treffen, auch wenn beide Seiten Argumente haben. Wenn du das lernst, wirst du zur Friedensstifterin aus Stärke.",
    "Skorpion": "Saturn im Skorpion lehrt dich, Macht verantwortungsvoll zu tragen. Deine Lektionen liegen darin, Kontrolle loszulassen, im Vertrauen als Praxis, in der Bereitschaft zu transformieren, was schmerzt. Du wirst herausgefordert, deine Tiefe ohne Manipulation einzusetzen. Wenn du das lernst, wirst du zu einer Kraft der echten Heilung.",

    </div>`;
  }

  const maxEl = Object.entries(elementCounts).sort((a,b)=>b[1]-a[1]).filter(e=>e[1]>0);

    const full = ASPECT_PROMPT + '\n\n' + lines.join('\n');
    const btn = document.getElementById('copyAspReadingBtn');
    const done = () => { if(btn){ const o=btn.getAttribute('data-label')||btn.textContent; btn.setAttribute('data-label', o); btn.textContent='✓ Kopiert! Jetzt in ChatGPT einfügen'; setTimeout(()=>{ btn.textContent=o; }, 2800); } };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(full).then(done).catch(()=>fallbackCopy(full, done));
    } else { fallbackCopy(full, done); }
  };

  document.addEventListener('DOMContentLoaded', function(){
    const inp = $('birthPlace');
    if(!inp) return;
    inp.addEventListener('input', function(){
      clearChosen();
      const q = inp.value.trim();
      if(placeDebounce) clearTimeout(placeDebounce);
      if(q.length < 2){ closeResults(); return; }
      placeDebounce = setTimeout(function(){ searchPlace(q); }, 300);
    });
    document.addEventListener('click', function(e){
      if(!e.target.closest('.place-group')) closeResults();
    });
  });
})();
</script>

<script>
// Binary Code Canvas Animation
(function() {
  const canvas = document.getElementById('binary-canvas');
  const ctx = canvas.getContext('2d');
  const chars = '10188011180818108801881010010118810001';
  const fontSize = 13;
  let columns, drops;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    columns = Math.floor(canvas.width / fontSize);
    drops = Array(columns).fill(1);
  }

  function draw() {
    ctx.fillStyle = 'rgba(8, 4, 26, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = fontSize + 'px monospace';

    for (let i = 0; i < drops.length; i++) {
      const char = chars[Math.floor(Math.random() * chars.length)];
      // Vary color between purple and wine tones
      const r = Math.floor(Math.random() * 60) + 140;
      const g = Math.floor(Math.random() * 30) + 50;
      const b = Math.floor(Math.random() * 80) + 160;
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillText(char, i * fontSize, drops[i] * fontSize);
      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }

  resize();
  window.addEventListener('resize', resize);
  setInterval(draw, 60);
})();
</script>
